name: AliOS Build CI

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Essential for pushing back to the repo

    - name: Install Dependencies
      run: |
        apt-get update
        apt-get install -y nasm gcc-multilib binutils xxd grub-common xorriso mtools dosfstools git python3 build-essential

    - name: Run Build
      run: |
        make clean
        make

    - name: Verify Multiboot Header
      run: |
        python3 -c "
        with open('alios4.bin', 'rb') as f:
            data = f.read(32768)
            pos = data.find(b'\xd6\x50\x52\xe8')
            if pos != -1:
                print(f'SUCCESS: Multiboot 2 Magic found at offset: {pos}')
            else:
                print('ERROR: Multiboot 2 header NOT FOUND')
                exit(1)
        "

    - name: Push Build Artifact
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global --add safe.directory "$GITHUB_WORKSPACE"

        # Ensure we are on the correct branch
        git checkout master || git checkout main

        # Force add the ISO (since it's likely in your .gitignore)
        git add -f alios4.iso

        if git diff --staged --quiet; then
          echo "No changes to the ISO. Skipping push."
        else
          git commit -m "Auto-build: Update alios4.iso [skip ci]"
          git push origin HEAD:master
        fi
