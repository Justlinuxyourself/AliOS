
name: AliOS Automatic Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  auto-release:
    name: Build and Auto-Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            nasm \
            gcc-multilib \
            binutils \
            xorriso \
            mtools \
            grub-common \
            grub-pc-bin

      - name: Build Kernel and ISO
        run: |
          make clean
          make 

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "AliOS Continuous Build"
          body: |
            This is an automated build of AliOS for the notebook hardware.
            
            **Last Updated:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
          files: |
            alios4.iso
            alios4.bin
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

