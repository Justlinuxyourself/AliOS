name: AliOS Build CI

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Dependencies
      run: |
        apt-get update
        apt-get install -y nasm gcc-multilib binutils xxd grub-common \
                           xorriso mtools dosfstools git python3 build-essential

    - name: Run Build
      run: |
        make clean
        make

    - name: Verify Multiboot Header
      run: |
        python3 -c "
        with open('alios4.bin', 'rb') as f:
            data = f.read(32768)
            pos = data.find(b'\xd6\x50\x52\xe8')
            if pos != -1:
                print(f'SUCCESS: Multiboot 2 Magic found at offset: {pos}')
            else:
                print('ERROR: Multiboot 2 header NOT FOUND')
                exit(1)
        "

    - name: Prepare Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Deletes the 'latest' tag locally and remotely so it can be recreated
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git tag -d latest || true
        git push origin :refs/tags/latest || true

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "AliOS Nightly Build"
        body: "Automated build containing the latest kernel, ISO, and disk image."
        prerelease: true
        files: |
          alios4.iso
          alios_disk.img
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
