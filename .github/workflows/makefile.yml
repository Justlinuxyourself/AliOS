name: AliOS Build CI

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        apt-get update
        apt-get install -y nasm gcc-multilib binutils xxd grub-common xorriso mtools dosfstools git python3 build-essential

    - name: Run Build
      run: |
        make clean
        make

    - name: Verify Section Presence
      run: objdump -h alios4.bin

    - name: Verify Multiboot Header
      run: |
        python3 -c "
        with open('alios4.bin', 'rb') as f:
            data = f.read(32768)
            pos = data.find(b'\xd6\x50\x52\xe8')
            if pos != -1:
                print(f'SUCCESS: Multiboot 2 Magic found at offset: {pos}')
            else:
                print('ERROR: Multiboot 2 header NOT FOUND')
                exit(1)
        "

    - name: Commit ISO
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Use "." instead of the variable to force current directory recognition
        git config --global --add safe.directory "*"
        
        # Identity
        git config --global user.name "AliOS-Builder[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Initialize if the container lost track of the .git folder
        git init
        git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git || git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        
        # Fetch to ensure we are on the right branch
        git fetch
        git checkout ${{ github.ref_name }} || git checkout -b ${{ github.ref_name }}

        git add -f alios4.iso
        
        if git diff --staged --quiet; then
          echo "No changes to the ISO. Skipping push."
        else
          git commit -m "Auto-build: Update alios4.iso [skip ci]"
          git push origin ${{ github.ref_name }}
        fi
