name: AliOS Build CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        apt-get update
        apt-get install -y nasm gcc-multilib binutils xxd grub-common \
                           xorriso mtools dosfstools git python3 build-essential

    - name: Run Build
      run: |
        make clean
        make

    - name: Verify Multiboot Header
      run: |
        python3 -c "
        with open('alios4.bin', 'rb') as f:
            data = f.read(32768)
            # Checking for the Multiboot2 magic number 0xE85250D6
            pos = data.find(b'\xd6\x50\x52\xe8')
            if pos != -1:
                print(f'SUCCESS: Multiboot 2 Magic found at {hex(pos)}')
            else:
                print('ERROR: Multiboot 2 header NOT FOUND')
                exit(1)
        "

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AliOS-ISO
        path: alios4.iso

    - name: Push to Branch (Optional)
      if: github.event_name == 'push'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add -f alios4.iso
        if ! git diff --staged --quiet; then
          git commit -m "Auto-build: Update alios4.iso [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
        fi
